<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Zodiquiz - Testini Çöz!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Üst Reklam Alanı -->
    <header>
        <div class="logo">ZODIQUIZ</div>
        <div class="header-ad">Reklam Alanı (728x90)</div>
    </header>

    <div class="main-wrapper">
        <!-- Ana İçerik: Quiz buraya gelecek -->
        <main id="quiz-area">
            <div class="container" id="quiz">
                <h2 id="question">Soru yükleniyor...</h2>
                <div id="answer-buttons"></div>
            </div>
        </main>

        <!-- Yan Panel: Trendler ve Kategoriler -->
        <aside class="sidebar">
            <h3>Trend Testler</h3>
            <ul>
                <li>Hangi Dizi Karakterisin?</li>
                <li>Aşk Hayatın Nasıl?</li>
            </ul>
            <div class="sidebar-ad">Reklam Alanı (300x250)</div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
